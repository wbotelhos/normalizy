name: Tests

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        ruby:
          - '2.7'
          - '3.0'
          - '3.1'
          - '3.3'
          - '3.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ruby and Bundle Install
        uses: ruby/setup-ruby@v1

        with:
          bundler-cache: true
          ruby-version: ${{ matrix.ruby }}

      - name: Spec
        env:
          CI: true
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          COVERAGE: true
          MINIMUM_COVERAGE: 80

        run: bundle exec rspec
